<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atelier — Gantt de projets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f6f3ec;
  --paper-2:#efe9dd;
  --ink:#1b1c22;
  --ink-soft:#3a3b44;
  --line:#ddd6c7;
  --line-soft:#e8e2d5;
  --muted:#8a857a;
  --accent:#c2410c;
  --accent-soft:#fde6da;
  --weekend:rgba(27,28,34,.035);
  --today:#c2410c;
  --shadow:0 1px 2px rgba(27,28,34,.06),0 8px 24px rgba(27,28,34,.07);
  --row:42px;
  --header-h:58px;
  --label-w:460px;
  --print-scale:1;
  --sidebar-w:266px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;font-family:"Manrope",system-ui,sans-serif;
  background:var(--paper);color:var(--ink);
  display:flex;height:100vh;overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{height:11px;width:11px}
::-webkit-scrollbar-thumb{background:#c9c2b2;border-radius:6px;border:3px solid var(--paper)}
::-webkit-scrollbar-track{background:transparent}

/* ---------- Sidebar ---------- */
.sidebar{
  width:var(--sidebar-w);flex:0 0 var(--sidebar-w);background:var(--ink);color:#e9e6df;
  display:flex;flex-direction:column;padding:22px 16px;gap:6px;
  transition:transform .22s ease,margin .22s ease;
}
body.sidebar-collapsed .sidebar{
  transform:translateX(calc(-1 * var(--sidebar-w)));
  margin-right:calc(-1 * var(--sidebar-w));
}
.brand{display:flex;align-items:baseline;gap:8px;padding:4px 8px 16px}
.brand .mark{font-family:"Bricolage Grotesque";font-weight:800;font-size:25px;letter-spacing:-.02em;line-height:1}
.brand .mark em{font-style:normal;color:var(--accent)}
.brand .sub{font-size:11px;color:#928d82;letter-spacing:.14em;text-transform:uppercase}
.side-h{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#7e7a70;padding:8px 8px 6px;margin-top:6px}
.proj-list{display:flex;flex-direction:column;gap:2px;overflow-y:auto;flex:1;margin:-2px -4px;padding:2px 4px}
.proj{
  display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;
  color:#cfcabf;font-weight:600;font-size:14px;border:0;background:transparent;text-align:left;width:100%;
  transition:background .15s,color .15s;
}
.proj:hover{background:rgba(255,255,255,.05);color:#fff}
.proj.active{background:var(--accent);color:#fff}
.proj .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;background:currentColor;opacity:.85}
.proj .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj .ct{font-size:11px;opacity:.6;font-weight:600}
.side-btn{
  display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:9px;
  background:rgba(255,255,255,.06);color:#e9e6df;border:1px solid rgba(255,255,255,.08);
  font-weight:600;font-size:13px;width:100%;transition:.15s;
}
.side-btn:hover{background:rgba(255,255,255,.12)}
.side-btn svg{width:16px;height:16px}
.io{display:flex;flex-direction:column;gap:6px;margin-top:8px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08)}
.io-row{display:flex;gap:6px}
.io-row .side-btn{flex:1;justify-content:center;padding:9px 6px;font-size:12px}
.dirty{display:flex;align-items:center;gap:7px;font-size:11.5px;color:#b9b3a7;padding:6px 8px 0}
.dirty .pip{width:7px;height:7px;border-radius:50%;background:#5fae6b}
.dirty.on .pip{background:#e0a23a;box-shadow:0 0 0 3px rgba(224,162,58,.18)}
.folder-hint{
  font-size:11px;color:#7e7a70;padding:4px 8px 0;line-height:1.35;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.folder-hint button{
  border:0;background:none;color:#b9b3a7;font:inherit;font-size:11px;
  text-decoration:underline;cursor:pointer;padding:0;margin-left:4px;
}
.folder-hint button:hover{color:#e9e6df}

/* ---------- Main ---------- */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{
  padding:18px 26px 14px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:18px;background:var(--paper);
}
.topbar h1{
  font-family:"Bricolage Grotesque";font-weight:700;font-size:26px;margin:0;letter-spacing:-.02em;
  outline:none;border-radius:6px;padding:1px 4px;margin-left:-4px;min-width:40px;
}
.topbar h1:focus{box-shadow:0 0 0 2px var(--accent-soft);background:#fff}
.topbar .meta{color:var(--muted);font-size:13px;font-weight:500}
.spacer{flex:1}
.tool{
  display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;
  color:var(--ink);font-weight:600;font-size:13px;padding:8px 13px;border-radius:9px;transition:.15s;
}
.tool:hover{border-color:#c4bba8;box-shadow:var(--shadow)}
.tool.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.tool.primary:hover{background:#a8380b}
.tool svg{width:15px;height:15px}
.zoom{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
.zoom button{border:0;background:#fff;padding:8px 11px;font-weight:700;color:var(--ink-soft);font-size:14px}
.zoom button:hover{background:var(--paper-2)}
.zoom button+button{border-left:1px solid var(--line)}

/* ---------- Board ---------- */
.board{flex:1;overflow:auto;position:relative}
.layout{display:flex;align-items:flex-start;min-height:100%}
.labels{position:sticky;left:0;z-index:20;background:var(--paper);flex:0 0 var(--label-w);width:var(--label-w);border-right:1px solid var(--line)}
.canvas{position:relative}

.corner{
  height:var(--header-h);position:sticky;top:0;z-index:30;background:var(--paper);
  border-bottom:1px solid var(--line);display:flex;align-items:flex-end;padding:0 16px 10px;
}
.corner span{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:700}

.lrow{
  height:var(--row);display:flex;align-items:center;gap:8px;padding:0 14px 0 10px;
  border-bottom:1px solid var(--line-soft);position:relative;
}
.lrow:hover{background:var(--paper-2)}
.lrow.sub{padding-left:38px}
.lrow.action.dragging-row,.lrow.sub.dragging-row{opacity:.45;background:var(--accent-soft)}
.lrow.sub.no-drop{cursor:default}
.lrow.drop-above::before,.lrow.drop-below::after{
  content:"";position:absolute;left:8px;right:8px;height:2px;background:var(--accent);border-radius:1px;z-index:2;
}
.lrow.drop-above::before{top:-1px}
.lrow.drop-below::after{bottom:-1px}
.lrow .drag-grip{
  width:18px;height:18px;flex:0 0 auto;border:0;background:transparent;color:var(--muted);
  display:grid;place-items:center;border-radius:5px;cursor:grab;padding:0;
}
.lrow .drag-grip:hover{background:#e3dccc;color:var(--ink)}
.lrow .drag-grip:active{cursor:grabbing}
.lrow.dragging-row .drag-grip{cursor:grabbing}
.lrow .caret{width:16px;height:16px;flex:0 0 auto;border:0;background:transparent;color:var(--muted);display:grid;place-items:center;border-radius:4px}
.lrow .caret:hover{background:#e3dccc;color:var(--ink)}
.lrow .caret svg{width:11px;height:11px;transition:transform .15s}
.lrow.collapsed .caret svg{transform:rotate(-90deg)}
.lrow .swatch{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
.lrow.sub .swatch{border-radius:50%;width:7px;height:7px}
.status-btn{
  width:22px;height:22px;flex:0 0 auto;padding:0;border:2px solid var(--muted);
  border-radius:50%;background:#fff;display:grid;place-items:center;transition:.15s;
}
.status-btn:hover{box-shadow:0 0 0 3px var(--paper-2)}
.status-btn .status-mark{display:block;width:0;height:0}
.status-btn.st-todo{color:var(--muted)}
.status-btn.st-in_progress{color:#2563eb;border-color:#2563eb;background:#eff6ff}
.status-btn.st-in_progress .status-mark{width:8px;height:8px;border-radius:50%;background:currentColor}
.status-btn.st-late{color:#c2410c;border-color:#c2410c;background:#fff7ed}
.status-btn.st-late .status-mark{width:auto;height:auto;font-size:13px;font-weight:800;line-height:1}
.status-btn.st-late .status-mark::before{content:"!"}
.status-btn.st-done{color:#15803d;border-color:#15803d;background:#f0fdf4}
.status-btn.st-done .status-mark{width:auto;height:auto;font-size:12px;font-weight:800;line-height:1}
.status-btn.st-done .status-mark::before{content:"✓"}
.status-btn.mini{width:18px;height:18px;pointer-events:none;flex-shrink:0}
.lrow.st-done .name{opacity:.62;text-decoration:line-through;text-decoration-color:rgba(27,28,34,.28)}
.status-pop{
  position:fixed;z-index:200;background:#fff;border:1px solid var(--line);
  border-radius:11px;box-shadow:var(--shadow);padding:6px;min-width:178px;
}
.status-pop button{
  display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border:0;
  background:transparent;border-radius:8px;font-size:13px;font-weight:600;
  color:var(--ink);text-align:left;cursor:pointer;
}
.status-pop button:hover,.status-pop button.on{background:var(--paper-2)}
.lrow .name{flex:1;min-width:0;font-size:15px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:text}
.lrow.sub .name{font-weight:500;color:var(--ink-soft);font-size:14px}
.lrow .dates{font-size:11.5px;color:var(--muted);font-weight:500;font-variant-numeric:tabular-nums;flex:0 0 88px;text-align:right}
.lrow .name.ms::after{content:"◆";color:var(--accent);margin-left:6px;font-size:10px}
.lrow .add-sub,.lrow .edit{opacity:0;width:22px;height:22px;border:0;background:transparent;border-radius:6px;color:var(--muted);display:grid;place-items:center;flex:0 0 auto}
.lrow:hover .add-sub,.lrow:hover .edit{opacity:1}
.lrow .add-sub:hover,.lrow .edit:hover{background:#e3dccc;color:var(--ink)}
.lrow .add-sub svg,.lrow .edit svg{width:14px;height:14px}
.lfoot{padding:11px 12px}
.lfoot.drop-target{outline:2px dashed var(--accent);outline-offset:-4px;border-radius:8px;background:var(--accent-soft)}
.add-action{
  display:inline-flex;align-items:center;gap:7px;border:1px dashed #c9c0ac;background:transparent;
  color:var(--ink-soft);font-weight:600;font-size:13px;padding:8px 13px;border-radius:9px;width:100%;justify-content:center;transition:.15s;
}
.add-action:hover{border-color:var(--accent);color:var(--accent);background:#fff}

/* timeline header */
.thead{height:var(--header-h);position:sticky;top:0;z-index:10;background:var(--paper);border-bottom:1px solid var(--line)}
.months{display:flex;height:26px}
.month{font-size:11px;font-weight:700;color:var(--ink-soft);letter-spacing:.04em;padding:6px 0 0 8px;border-left:1px solid var(--line);text-transform:capitalize;overflow:hidden;white-space:nowrap}
.days{display:flex;height:32px}
.day{flex:0 0 auto;border-left:1px solid var(--line-soft);text-align:center;padding-top:4px;font-variant-numeric:tabular-nums}
.day.we{background:var(--weekend)}
.day .dn{font-size:12px;font-weight:600;color:var(--ink-soft);line-height:1.1}
.day .wd{font-size:9px;color:var(--muted);text-transform:uppercase}
.day.is-today .dn{color:#fff;background:var(--today);border-radius:5px;display:inline-block;width:19px;height:19px;line-height:19px}

.cbody{position:relative}
.bg-we{position:absolute;top:0;bottom:0;background:var(--weekend);z-index:0}
.rowline{position:absolute;left:0;right:0;height:var(--row);border-bottom:1px solid var(--line-soft);z-index:0}
.rowline.alt{background:rgba(27,28,34,.012)}
.todayline{position:absolute;top:0;bottom:0;width:2px;background:var(--today);z-index:4;opacity:.85}
.todayline::before{content:"";position:absolute;top:-1px;left:-4px;border:5px solid transparent;border-top-color:var(--today)}
svg.deps{position:absolute;top:0;left:0;z-index:3;overflow:visible;pointer-events:none}

.bar{position:absolute;height:24px;z-index:5;border-radius:7px;display:flex;align-items:center;cursor:grab;
  box-shadow:0 1px 2px rgba(27,28,34,.12);transition:box-shadow .15s}
.bar:hover{box-shadow:0 2px 8px rgba(27,28,34,.22);z-index:6}
.bar.dragging{cursor:grabbing;box-shadow:0 6px 18px rgba(27,28,34,.28);z-index:9;transition:none}
.bar .fill{position:absolute;inset:0;border-radius:7px;overflow:hidden}
.bar .prog{position:absolute;top:0;left:0;bottom:0;background:rgba(0,0,0,.26);border-right:1px solid rgba(255,255,255,.35)}
.bar .blabel{position:absolute;left:calc(100% + 8px);white-space:nowrap;font-size:11.5px;font-weight:600;color:var(--ink-soft);pointer-events:none}
.bar .pct{position:relative;font-size:10.5px;font-weight:700;color:#fff;padding-left:8px;text-shadow:0 1px 1px rgba(0,0,0,.25);pointer-events:none}
.handle{position:absolute;top:0;bottom:0;width:8px;z-index:2;cursor:ew-resize}
.handle.l{left:-1px;border-radius:7px 0 0 7px}
.handle.r{right:-1px;border-radius:0 7px 7px 0}
.bar:hover .handle{background:rgba(255,255,255,.25)}

.summary{position:absolute;height:11px;z-index:5;border-radius:3px;cursor:default}
.summary .sbar{position:absolute;inset:0;border-radius:3px;opacity:.32}
.summary .sprog{position:absolute;top:0;bottom:0;left:0;border-radius:3px}
.summary::before,.summary::after{content:"";position:absolute;bottom:-4px;width:0;height:0;border:5px solid transparent}
.summary::before{left:0;border-left-width:6px;border-left-color:currentColor;border-bottom-color:currentColor;border-right-width:0}
.summary::after{right:0;border-right-width:6px;border-right-color:currentColor;border-bottom-color:currentColor;border-left-width:0}
.summary .blabel{position:absolute;left:calc(100% + 9px);top:-6px;white-space:nowrap;font-size:11.5px;font-weight:700;color:var(--ink-soft)}

.milestone{position:absolute;z-index:6;width:18px;height:18px;cursor:grab}
.milestone svg{width:18px;height:18px;filter:drop-shadow(0 1px 2px rgba(27,28,34,.25))}
.milestone.dragging{cursor:grabbing;z-index:9}
.milestone .blabel{position:absolute;left:24px;top:1px;white-space:nowrap;font-size:11.5px;font-weight:600;color:var(--ink-soft)}

/* empty */
.empty{flex:1;display:grid;place-items:center;text-align:center;padding:40px}
.empty .inner{max-width:420px}
.empty h2{font-family:"Bricolage Grotesque";font-size:30px;margin:0 0 10px;letter-spacing:-.02em}
.empty p{color:var(--muted);font-size:15px;line-height:1.55;margin:0 0 22px}
.empty .row{display:flex;gap:10px;justify-content:center}

/* ---------- Modal ---------- */
.scrim{position:fixed;inset:0;background:rgba(27,28,34,.34);backdrop-filter:blur(2px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.scrim.on{display:flex}
.modal{background:var(--paper);width:480px;max-width:100%;max-height:90vh;overflow:auto;border-radius:16px;box-shadow:0 20px 60px rgba(27,28,34,.3);padding:24px}
.modal h3{font-family:"Bricolage Grotesque";font-size:20px;margin:0 0 2px;letter-spacing:-.01em}
.modal .kind{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:18px}
.field{margin-bottom:15px}
.field label{display:block;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
.field input[type=text],.field input[type=date]{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:14px;background:#fff;color:var(--ink)}
.field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.two{display:flex;gap:12px}
.two .field{flex:1}
.seg{display:flex;gap:6px}
.seg button{flex:1;padding:9px;border:1px solid var(--line);background:#fff;border-radius:9px;font-weight:600;font-size:13px;color:var(--ink-soft)}
.seg button.on{background:var(--accent);border-color:var(--accent);color:#fff}
.range-row{display:flex;align-items:center;gap:12px}
.range-row input[type=range]{flex:1;accent-color:var(--accent)}
.range-row .val{font-weight:700;font-variant-numeric:tabular-nums;width:46px;text-align:right}
.deps{display:flex;flex-direction:column;gap:5px;max-height:150px;overflow:auto;border:1px solid var(--line);border-radius:9px;padding:8px;background:#fff}
.deps label{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500;text-transform:none;letter-spacing:0;color:var(--ink);margin:0;cursor:pointer;padding:3px}
.deps input{accent-color:var(--accent);width:15px;height:15px}
.deps .none{color:var(--muted);font-size:13px;padding:4px}
.modal-foot{display:flex;gap:10px;margin-top:22px;align-items:center}
.modal-foot .del{margin-right:auto;color:#c0392b;border:1px solid #e6c3bd;background:#fff;padding:9px 14px;border-radius:9px;font-weight:600;font-size:13px}
.modal-foot .del:hover{background:#fbeae7}
.modal-foot .ghost{border:1px solid var(--line);background:#fff;padding:9px 16px;border-radius:9px;font-weight:600;font-size:14px;color:var(--ink-soft)}
.modal-foot .save{background:var(--accent);color:#fff;border:0;padding:10px 20px;border-radius:9px;font-weight:700;font-size:14px}
.modal-foot .save:hover{background:#a8380b}

/* ---------- Responsables ---------- */
.ppl{display:inline-flex;align-items:center;flex:0 0 auto;margin-right:4px}
.ppl .chip{width:21px;height:21px;border-radius:50%;color:#fff;font-size:9.5px;font-weight:700;display:inline-grid;place-items:center;border:2px solid var(--paper);margin-left:-6px;box-shadow:0 1px 1px rgba(0,0,0,.08)}
.ppl .chip:first-child{margin-left:0}
.ppl .more{font-size:10px;font-weight:700;color:var(--muted);margin-left:4px}
.lrow:hover .ppl .chip{border-color:var(--paper-2)}
.chips-input{display:flex;flex-wrap:wrap;gap:6px;padding:7px;border:1px solid var(--line);border-radius:9px;background:#fff;min-height:42px;align-items:center}
.chips-input:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.pchip{display:inline-flex;align-items:center;gap:6px;padding:3px 4px 3px 3px;background:var(--paper-2);border-radius:99px;font-size:12.5px;font-weight:600;color:var(--ink)}
.pchip .av{width:19px;height:19px;border-radius:50%;color:#fff;font-size:9px;font-weight:700;display:inline-grid;place-items:center}
.pchip .rm{border:0;background:transparent;color:var(--muted);cursor:pointer;padding:0 5px;font-size:15px;line-height:1;border-radius:50%}
.pchip .rm:hover{color:#c0392b}
.chips-input input{border:0;outline:0;flex:1;min-width:130px;padding:4px;font-family:inherit;font-size:13px;background:transparent;color:var(--ink)}
.chips-help{font-size:11px;color:var(--muted);margin-top:6px}
.pf-action{font-weight:700!important}
.pf-sub{padding-left:24px!important;color:var(--ink-soft)!important}
.pf-toggle{border:1px solid var(--line);background:#fff;border-radius:7px;padding:4px 9px;font-size:11px;font-weight:600;color:var(--ink-soft);cursor:pointer}
.pf-toggle:hover{border-color:#c4bba8}

/* ---------- Impression / PDF ---------- */
.print-head{display:none}
@media print{
  @page{size:A4 landscape;margin:10mm}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{display:block;height:auto;overflow:visible;background:#fff}
  .sidebar,.scrim,.topbar{display:none!important}
  .main{display:block;height:auto;overflow:visible}
  .print-head{display:flex;align-items:baseline;gap:12px;margin-bottom:8px}
  .print-head h1{font-family:"Bricolage Grotesque";font-weight:700;font-size:20px;margin:0;letter-spacing:-.02em}
  .print-head .ph-meta{font-size:11px;color:#666;font-weight:600}
  .print-head .ph-legend{margin-left:auto;font-size:10px;color:#666;display:flex;gap:14px;align-items:center}
  .print-head .ph-legend i{font-style:normal;display:inline-flex;align-items:center;gap:5px}
  .print-head .ph-legend .sw{width:10px;height:10px;border-radius:2px;display:inline-block}
  .board{overflow:visible!important;border:0;height:auto!important}
  .layout{zoom:var(--print-scale)}
  /* fige les volets pour une mise en page statique à l'impression */
  .labels,.corner,.thead,.canvas{position:static!important}
  .labels{border-right:1px solid var(--line)}
  .lrow .add-sub,.lrow .edit,.lrow .drag-grip,.lrow .status-btn,.lfoot,.bar .handle{display:none!important}
  .lrow:hover{background:transparent}
  .lrow,.bar,.summary,.milestone{break-inside:avoid}
  .bar,.summary,.milestone svg{box-shadow:none!important;filter:none!important}
}
</style>
</head>
<body>

<aside class="sidebar" id="sidebarPanel">
  <div class="brand">
    <div class="mark">Atelier<em>.</em></div>
  </div>
  <div class="side-h">Projets</div>
  <div class="proj-list" id="projList"></div>
  <button class="side-btn" id="addProj">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    Nouveau projet
  </button>
  <div class="io">
    <div class="io-row">
      <button class="side-btn" id="exportBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3M7 10l5 5 5-5M5 21h14"/></svg>
        Exporter
      </button>
      <button class="side-btn" id="importBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 8l5-5 5 5M5 21h14"/></svg>
        Importer
      </button>
    </div>
    <div class="dirty" id="dirty"><span class="pip"></span><span id="dirtyTxt">Tout est exporté</span></div>
    <div class="folder-hint" id="folderHint" hidden></div>
  </div>
  <input type="file" id="fileInput" accept="application/json,.json" hidden>
</aside>

<main class="main" id="main"></main>

<div class="scrim" id="scrim"><div class="modal" id="modal"></div></div>

<script>
"use strict";
/* ============ État ============ */
const PALETTE=["#c2410c","#0d9488","#7c3aed","#2563eb","#db2777","#65a30d","#0891b2","#b45309"];
let state={projects:[],activeId:null};
let dirty=false;
const printFilter={active:false,from:null,to:null,included:null};
const passFilter=t=>!printFilter.active||(printFilter.included&&printFilter.included.has(t.id));
let dayWidth=30;
const ROW=42, HEADER=58, LABELW=460;
const GRIP_SVG=`<svg viewBox="0 0 12 12" fill="currentColor"><circle cx="4" cy="3" r="1"/><circle cx="8" cy="3" r="1"/><circle cx="4" cy="6" r="1"/><circle cx="8" cy="6" r="1"/><circle cx="4" cy="9" r="1"/><circle cx="8" cy="9" r="1"/></svg>`;
const STATUSES=[
  {id:"todo",label:"À faire"},
  {id:"in_progress",label:"En cours"},
  {id:"late",label:"En retard"},
  {id:"done",label:"Terminé"}
];
const STATUS_IDS=new Set(STATUSES.map(s=>s.id));
function normStatus(s){return STATUS_IDS.has(s)?s:"todo";}
function statusOf(t){return normStatus(t.status);}
function statusLabel(id){return STATUSES.find(s=>s.id===id)?.label||"À faire";}
function renderStatusBtn(t){
  const s=statusOf(t),lb=statusLabel(s);
  return `<button type="button" class="status-btn st-${s}" data-act="status" title="État : ${esc(lb)} — cliquer pour modifier" aria-label="État : ${esc(lb)}"><span class="status-mark"></span></button>`;
}
function closeStatusPicker(){document.getElementById("statusPop")?.remove();}
function openStatusPicker(p,t,anchor){
  closeStatusPicker();
  const pop=document.createElement("div");
  pop.className="status-pop";pop.id="statusPop";
  pop.innerHTML=STATUSES.map(s=>`<button type="button" data-status="${s.id}" class="${statusOf(t)===s.id?"on":""}">
    <span class="status-btn st-${s.id} mini"><span class="status-mark"></span></span>${esc(s.label)}</button>`).join("");
  document.body.appendChild(pop);
  const r=anchor.getBoundingClientRect(),pw=pop.offsetWidth,ph=pop.offsetHeight;
  pop.style.left=Math.max(8,Math.min(r.left,window.innerWidth-pw-8))+"px";
  pop.style.top=Math.min(r.bottom+6,window.innerHeight-ph-8)+"px";
  pop.querySelectorAll("[data-status]").forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      t.status=btn.dataset.status;
      markDirty(true);closeStatusPicker();render();
    };
  });
  const outside=e=>{
    if(!pop.contains(e.target)&&!anchor.contains(e.target)){closeStatusPicker();document.removeEventListener("click",outside,true);}
  };
  setTimeout(()=>document.addEventListener("click",outside,true),0);
}
const collapsed=new Set();

/* ============ Dates (jour entier, sans fuseau) ============ */
const MS=86400000;
function toDay(iso){const[y,m,d]=iso.split("-").map(Number);return Math.round(Date.UTC(y,m-1,d)/MS);}
function fromDay(n){const dt=new Date(n*MS);return dt.toISOString().slice(0,10);}
function todayDay(){const n=new Date();return Math.round(Date.UTC(n.getFullYear(),n.getMonth(),n.getDate())/MS);}
function fmtShort(iso){const[y,m,d]=iso.split("-");return d+"/"+m;}
const FR_MONTH=["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];
const FR_WD=["L","M","M","J","V","S","D"];
function weekdayIdx(day){const dt=new Date(day*MS);return (dt.getUTCDay()+6)%7;}

/* ============ Utilitaires ============ */
const uid=()=>Math.random().toString(36).slice(2,9);
const $=s=>document.querySelector(s);
function markDirty(v){dirty=v;const el=$("#dirty");el.classList.toggle("on",v);$("#dirtyTxt").textContent=v?"Modifications non exportées":"Tout est exporté";}
function activeProject(){return state.projects.find(p=>p.id===state.activeId)||null;}
function projColor(i){return PALETTE[i%PALETTE.length];}
function initials(name){return name.trim().split(/\s+/).slice(0,2).map(s=>s[0]||"").join("").toUpperCase()||"·";}
function nameColor(name){let h=2166136261;for(let i=0;i<name.length;i++){h^=name.charCodeAt(i);h=Math.imul(h,16777619);}return `hsl(${Math.abs(h)%360} 52% 44%)`;}
function renderPeople(arr,max=3){
  if(!arr||!arr.length)return "";
  const show=arr.slice(0,max),extra=arr.length-show.length;
  return `<span class="ppl">${show.map(n=>`<span class="chip" style="background:${nameColor(n)}" title="${esc(n)}">${esc(initials(n))}</span>`).join("")}${extra>0?`<span class="more">+${extra}</span>`:""}</span>`;
}

/* tâches d'un projet, ordonnées : action puis ses sous-actions */
function orderedTasks(p){
  const out=[];
  p.tasks.filter(t=>!t.parentId&&passFilter(t)).forEach(a=>{
    out.push(a);
    const show=printFilter.active||!collapsed.has(a.id);
    if(show) p.tasks.filter(t=>t.parentId===a.id&&passFilter(t)).forEach(s=>out.push(s));
  });
  return out;
}
function actionBlock(p,actionId){
  const action=p.tasks.find(t=>t.id===actionId);
  if(!action||action.parentId)return[];
  const block=[action];
  p.tasks.forEach(t=>{if(t.parentId===actionId)block.push(t);});
  return block;
}
function moveActionGroup(p,dragId,targetActionId,place){
  if(!dragId||!targetActionId||dragId===targetActionId)return;
  const block=actionBlock(p,dragId);
  if(!block.length)return;
  const blockIds=new Set(block.map(t=>t.id));
  const remaining=p.tasks.filter(t=>!blockIds.has(t.id));
  let insertAt=remaining.findIndex(t=>t.id===targetActionId);
  if(insertAt<0)return;
  if(place==="after")insertAt++;
  const next=[...remaining.slice(0,insertAt),...block,...remaining.slice(insertAt)];
  const same=next.length===p.tasks.length&&next.every((t,i)=>t.id===p.tasks[i].id);
  if(same)return;
  p.tasks=next;
  markDirty(true);
  render();
}
function moveSubAction(p,dragId,targetSubId,place){
  const drag=p.tasks.find(t=>t.id===dragId);
  const target=p.tasks.find(t=>t.id===targetSubId);
  if(!drag||!target||!drag.parentId||drag.parentId!==target.parentId)return;
  if(dragId===targetSubId)return;
  const remaining=p.tasks.filter(t=>t.id!==dragId);
  let insertAt=remaining.findIndex(t=>t.id===targetSubId);
  if(insertAt<0)return;
  if(place==="after")insertAt++;
  const next=[...remaining.slice(0,insertAt),drag,...remaining.slice(insertAt)];
  const same=next.length===p.tasks.length&&next.every((t,i)=>t.id===p.tasks[i].id);
  if(same)return;
  p.tasks=next;
  markDirty(true);
  render();
}
function children(p,id){return p.tasks.filter(t=>t.parentId===id&&passFilter(t));}
function colorOf(p,t){
  const actions=p.tasks.filter(x=>!x.parentId);
  const root=t.parentId?p.tasks.find(x=>x.id===t.parentId):t;
  return projColor(actions.indexOf(root));
}
/* bornes effectives d'une tâche (résumé si elle a des enfants) */
function span(p,t){
  const kids=children(p,t.id);
  if(kids.length){
    let s=Infinity,e=-Infinity,pw=0,dw=0;
    kids.forEach(k=>{const ss=toDay(k.start),ee=toDay(k.isMilestone?k.start:k.end);
      s=Math.min(s,ss);e=Math.max(e,ee);const dur=Math.max(1,ee-ss+1);pw+=(k.progress||0)*dur;dw+=dur;});
    return{start:s,end:e,progress:dw?Math.round(pw/dw):0,summary:true};
  }
  const s=toDay(t.start),e=toDay(t.isMilestone?t.start:t.end);
  return{start:s,end:e,progress:t.progress||0,summary:false};
}
function projBounds(p){
  if(printFilter.active&&printFilter.from&&printFilter.to)
    return{min:toDay(printFilter.from),max:toDay(printFilter.to)};
  if(!p.tasks.length){const t=todayDay();return{min:t-5,max:t+25};}
  let mn=Infinity,mx=-Infinity;
  p.tasks.forEach(t=>{const sp=span(p,t);mn=Math.min(mn,sp.start);mx=Math.max(mx,sp.end);});
  return{min:mn-3,max:mx+7};
}
/* extent réel des données (sans marge) pour pré-remplir la période d'impression */
function dataExtent(p){
  if(!p.tasks.length){const t=todayDay();return{min:t,max:t+30};}
  let mn=Infinity,mx=-Infinity;
  p.tasks.forEach(t=>{const s=toDay(t.start),e=toDay(t.isMilestone?t.start:t.end);mn=Math.min(mn,s);mx=Math.max(mx,e);});
  return{min:mn,max:mx};
}

/* ============ Rendu ============ */
function render(){renderSidebar();renderMain();}

function renderSidebar(){
  const list=$("#projList");list.innerHTML="";
  state.projects.forEach((p,i)=>{
    const b=document.createElement("button");
    b.className="proj"+(p.id===state.activeId?" active":"");
    b.innerHTML=`<span class="dot" style="color:${projColor(i)}"></span>
      <span class="nm">${esc(p.name)}</span><span class="ct">${p.tasks.length}</span>`;
    b.onclick=()=>{state.activeId=p.id;render();};
    list.appendChild(b);
  });
}

function renderMain(){
  const main=$("#main");
  const p=activeProject();
  if(!p){
    main.innerHTML=`<div class="empty"><div class="inner">
      <h2>Aucun projet ouvert</h2>
      <p>Créez un projet pour démarrer un planning, ou importez un fichier JSON exporté précédemment.</p>
      <div class="row">
        <button type="button" class="tool" id="sidebarToggleTop" title="Afficher / masquer le menu Projets">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          Projets</button>
        <button class="tool primary" id="e_new">Créer un projet</button>
        <button class="tool" id="e_imp">Importer un JSON</button>
      </div></div></div>`;
    wireSidebarToggle();
    $("#e_new").onclick=addProject;$("#e_imp").onclick=()=>importFromDisk();
    return;
  }
  const b=projBounds(p);const totalDays=b.max-b.min+1;const today=todayDay();
  const tasks=orderedTasks(p);
  const cw=totalDays*dayWidth;

  /* en-tête mois */
  let months="";let i=0;
  while(i<totalDays){
    const d=new Date((b.min+i)*MS);const mo=d.getUTCMonth(),yr=d.getUTCFullYear();
    let c=0;while(i+c<totalDays){const dd=new Date((b.min+i+c)*MS);if(dd.getUTCMonth()!==mo)break;c++;}
    months+=`<div class="month" style="width:${c*dayWidth}px">${FR_MONTH[mo]} ${yr}</div>`;i+=c;
  }
  /* jours */
  let days="";
  for(let k=0;k<totalDays;k++){const day=b.min+k;const wd=weekdayIdx(day);const we=wd>=5;
    days+=`<div class="day${we?" we":""}${day===today?" is-today":""}" style="width:${dayWidth}px">
      <div class="dn">${new Date(day*MS).getUTCDate()}</div><div class="wd">${FR_WD[wd]}</div></div>`;}

  /* fonds week-end + lignes */
  let weBg="";for(let k=0;k<totalDays;k++){if(weekdayIdx(b.min+k)>=5)weBg+=`<div class="bg-we" style="left:${k*dayWidth}px;width:${dayWidth}px"></div>`;}
  let rowsBg="";tasks.forEach((t,r)=>{rowsBg+=`<div class="rowline${r%2?" alt":""}" style="top:${r*ROW}px"></div>`;});
  const todayLine=(today>=b.min&&today<=b.max)?`<div class="todayline" style="left:${(today-b.min)*dayWidth+dayWidth/2}px"></div>`:"";

  /* barres */
  let bars="";const pos={};
  tasks.forEach((t,r)=>{
    const sp=span(p,t);const col=colorOf(p,t);
    const cy=r*ROW+ROW/2;
    // clamp à la fenêtre visible (utile pour l'impression d'une période réduite)
    if(t.isMilestone){
      if(sp.start<b.min||sp.start>b.max)return;
      const x=(sp.start-b.min)*dayWidth;
      pos[t.id]={x:x+dayWidth/2,r,cy,startX:x+dayWidth/2,endX:x+dayWidth/2};
      bars+=`<div class="milestone" data-id="${t.id}" data-kind="ms" style="left:${x+dayWidth/2-9}px;top:${r*ROW+(ROW-18)/2}px;color:${col}">
        <svg viewBox="0 0 18 18"><path d="M9 0l9 9-9 9-9-9z" fill="${col}"/></svg>
        <span class="blabel">${esc(t.name)}</span></div>`;
      return;
    }
    if(sp.end<b.min||sp.start>b.max)return;
    const vs=Math.max(sp.start,b.min),ve=Math.min(sp.end,b.max);
    const x=(vs-b.min)*dayWidth;
    if(sp.summary){
      const w=(ve-vs+1)*dayWidth;
      pos[t.id]={x,r,cy,startX:x,endX:x+w};
      bars+=`<div class="summary" data-id="${t.id}" style="left:${x}px;width:${w}px;top:${r*ROW+(ROW-11)/2}px;color:${col}">
        <div class="sbar" style="background:${col}"></div>
        <div class="sprog" style="width:${sp.progress}%;background:${col}"></div>
        <span class="blabel">${sp.progress}%</span></div>`;
    }else{
      const w=Math.max(dayWidth*0.9,(ve-vs+1)*dayWidth);
      pos[t.id]={x,r,cy,startX:x,endX:x+w};
      const showPct=w>46;
      bars+=`<div class="bar" data-id="${t.id}" data-kind="bar" style="left:${x}px;width:${w}px;top:${r*ROW+(ROW-24)/2}px;background:${col}">
        <div class="fill"><div class="prog" style="width:${sp.progress}%"></div></div>
        ${showPct?`<span class="pct">${sp.progress}%</span>`:""}
        <span class="blabel">${esc(t.name)}</span>
        <div class="handle l"></div><div class="handle r"></div></div>`;
    }
  });

  /* flèches de dépendance */
  let deps="";
  tasks.forEach(t=>{
    (t.deps||[]).forEach(dep=>{
      const a=pos[dep],bp=pos[t.id];if(!a||!bp)return;
      const x1=a.endX,y1=a.cy,x2=bp.startX,y2=bp.cy;
      const mx=Math.max(x1+14,x2-14);
      const path=`M ${x1} ${y1} H ${mx-10} ${y2>y1?"q 10 0 10 10":"q 10 0 10 -10"} V ${y2+(y2>y1?-10:10)} ${x2>mx?"q 0 10 10 10":"q 0 10 -10 10"} H ${x2-6}`;
      deps+=`<path d="${path}" fill="none" stroke="#9c948020" stroke-width="0" /><path d="${path}" fill="none" stroke="#b0a892" stroke-width="1.6"/><path d="M ${x2} ${y2} l -7 -4 v 8 z" fill="#b0a892"/>`;
    });
  });

  /* liste de gauche */
  let labels="";
  tasks.forEach(t=>{
    const isAction=!t.parentId;const hasKids=isAction&&children(p,t.id).length>0;
    const col=colorOf(p,t);const sp=span(p,t);
    const dateTxt=t.isMilestone?fmtShort(t.start):fmtShort(fromDay(sp.start))+"–"+fmtShort(fromDay(sp.end));
    const st=statusOf(t);
    labels+=`<div class="lrow ${isAction?"action":"sub"} st-${st}${collapsed.has(t.id)?" collapsed":""}" data-id="${t.id}"${isAction?"":` data-parent="${t.parentId}"`}>
      ${isAction?`<button type="button" class="drag-grip" draggable="true" data-drag="action" title="Glisser pour réordonner le groupe">${GRIP_SVG}</button>
      <button type="button" class="caret" data-act="toggle" ${hasKids?"":'style="visibility:hidden"'}>
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 4l4 4 4-4"/></svg></button>`
      :`<button type="button" class="drag-grip" draggable="true" data-drag="sub" title="Glisser pour réordonner dans le groupe">${GRIP_SVG}</button>`}
      ${renderStatusBtn(t)}
      <span class="swatch" style="background:${col}"></span>
      <span class="name${t.isMilestone?" ms":""}" data-act="edit">${esc(t.name)}</span>
      ${renderPeople(t.assignees)}
      <span class="dates">${dateTxt}</span>
      ${isAction?`<button class="add-sub" data-act="addsub" title="Ajouter une sous-action">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>`:""}
      <button class="edit" data-act="edit" title="Éditer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
    </div>`;
  });

  main.innerHTML=`
    <div class="topbar">
      <button type="button" class="tool" id="sidebarToggleTop" title="Afficher / masquer le menu Projets">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        Projets</button>
      <h1 id="projTitle" contenteditable="true" spellcheck="false">${esc(p.name)}</h1>
      <span class="meta">${tasks.length} ligne${tasks.length>1?"s":""}</span>
      <div class="spacer"></div>
      <div class="zoom"><button id="zo">–</button><button id="zi">+</button></div>
      <button class="tool" id="printBtn" title="Imprimer en paysage ou enregistrer en PDF">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg>
        Imprimer / PDF</button>
      <button class="tool" id="delProj">Supprimer</button>
      <button class="tool primary" id="addAction">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Action</button>
    </div>
    <div class="print-head">
      <h1>${esc(p.name)}</h1>
      <span class="ph-meta">Édité le ${new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"})}${printFilter.active?` · Période ${fmtShort(printFilter.from)} → ${fmtShort(printFilter.to)}`:""}</span>
      <span class="ph-legend">
        <i><span class="sw" style="background:var(--accent)"></span>Tâche</i>
        <i style="color:var(--accent)">◆ Jalon</i>
        <i><span class="sw" style="background:rgba(0,0,0,.26)"></span>Avancement</i>
      </span>
    </div>
    <div class="board" id="board">
      <div class="layout" style="width:${LABELW+cw}px">
        <div class="labels">
          <div class="corner"><span>Actions & sous-actions</span></div>
          ${labels}
          <div class="lfoot"><button class="add-action" id="addAction2">+ Ajouter une action</button></div>
        </div>
        <div class="canvas" style="width:${cw}px">
          <div class="thead"><div class="months">${months}</div><div class="days">${days}</div></div>
          <div class="cbody" id="cbody" style="height:${tasks.length*ROW}px;width:${cw}px">
            ${weBg}${rowsBg}${todayLine}
            <svg class="deps" width="${cw}" height="${tasks.length*ROW}">${deps}</svg>
            ${bars}
          </div>
        </div>
      </div>
    </div>`;

  /* listeners topbar */
  wireSidebarToggle();
  $("#addAction").onclick=()=>addTask(p,null);
  $("#addAction2").onclick=()=>addTask(p,null);
  $("#delProj").onclick=()=>deleteProject(p);
  $("#printBtn").onclick=printGantt;
  $("#zi").onclick=()=>{dayWidth=Math.min(60,dayWidth+6);render();};
  $("#zo").onclick=()=>{dayWidth=Math.max(12,dayWidth-6);render();};
  const title=$("#projTitle");
  title.addEventListener("blur",()=>{const v=title.textContent.trim()||"Projet";if(v!==p.name){p.name=v;markDirty(true);renderSidebar();}});
  title.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();title.blur();}});

  /* listeners liste gauche */
  main.querySelectorAll(".lrow").forEach(row=>{
    const id=row.dataset.id;
    row.querySelectorAll("[data-act]").forEach(el=>{
      el.addEventListener("click",e=>{
        e.stopPropagation();const act=el.dataset.act;
        if(act==="toggle"){if(collapsed.has(id))collapsed.delete(id);else collapsed.add(id);render();}
        else if(act==="addsub")addTask(p,id);
        else if(act==="status")openStatusPicker(p,p.tasks.find(t=>t.id===id),el);
        else if(act==="edit")openEditor(p,p.tasks.find(t=>t.id===id));
      });
    });
  });

  enableDrag(p,b.min);
  enableRowReorder(p);
}

/* ============ Réordonner actions et sous-actions ============ */
function enableRowReorder(p){
  const main=$("#main");
  let dragId=null,dragKind=null;
  const payload=id=>`${dragKind||"action"}:${id}`;
  const parsePayload=raw=>{
    if(!raw)return null;
    const i=raw.indexOf(":");
    if(i<0)return{kind:"action",id:raw};
    return{kind:raw.slice(0,i),id:raw.slice(i+1)};
  };
  const readDrag=e=>{
    const raw=e.dataTransfer.getData("text/plain")||dragId&&payload(dragId);
    if(raw&&raw.includes(":"))return parsePayload(raw);
    if(dragId)return{kind:dragKind||"action",id:dragId};
    return null;
  };
  const clearMarks=()=>main.querySelectorAll(".lrow").forEach(r=>{
    r.classList.remove("dragging-row","drop-above","drop-below","no-drop");
  });
  const markDrop=(row,after)=>{
    row.classList.toggle("drop-below",after);
    row.classList.toggle("drop-above",!after);
    row.classList.remove("no-drop");
  };
  main.querySelectorAll(".lrow .drag-grip").forEach(grip=>{
    grip.addEventListener("dragstart",e=>{
      const row=grip.closest(".lrow");
      dragId=row.dataset.id;
      dragKind=grip.dataset.drag||"action";
      e.dataTransfer.effectAllowed="move";
      e.dataTransfer.setData("text/plain",payload(dragId));
      row.classList.add("dragging-row");
    });
    grip.addEventListener("dragend",()=>{dragId=null;dragKind=null;clearMarks();});
    grip.addEventListener("click",e=>e.stopPropagation());
  });
  const dropHalf=(row,e)=>e.clientY>row.getBoundingClientRect().top+row.offsetHeight/2;
  main.querySelectorAll(".lrow.action").forEach(row=>{
    row.addEventListener("dragover",e=>{
      const d=readDrag(e);
      if(!d||d.kind!=="action"||row.dataset.id===d.id)return;
      e.preventDefault();
      e.dataTransfer.dropEffect="move";
      markDrop(row,dropHalf(row,e));
    });
    row.addEventListener("dragleave",e=>{
      if(!row.contains(e.relatedTarget))row.classList.remove("drop-above","drop-below","no-drop");
    });
    row.addEventListener("drop",e=>{
      e.preventDefault();
      const d=readDrag(e);
      if(!d||d.kind!=="action"||row.dataset.id===d.id)return;
      clearMarks();
      moveActionGroup(p,d.id,row.dataset.id,dropHalf(row,e)?"after":"before");
    });
  });
  main.querySelectorAll(".lrow.sub").forEach(row=>{
    row.addEventListener("dragover",e=>{
      const d=readDrag(e);
      if(!d||d.kind!=="sub"||row.dataset.id===d.id)return;
      const dragTask=p.tasks.find(t=>t.id===d.id);
      if(!dragTask||dragTask.parentId!==row.dataset.parent){
        row.classList.add("no-drop");
        row.classList.remove("drop-above","drop-below");
        return;
      }
      e.preventDefault();
      e.dataTransfer.dropEffect="move";
      markDrop(row,dropHalf(row,e));
    });
    row.addEventListener("dragleave",e=>{
      if(!row.contains(e.relatedTarget))row.classList.remove("drop-above","drop-below","no-drop");
    });
    row.addEventListener("drop",e=>{
      e.preventDefault();
      const d=readDrag(e);
      if(!d||d.kind!=="sub"||row.dataset.id===d.id)return;
      const dragTask=p.tasks.find(t=>t.id===d.id);
      if(!dragTask||dragTask.parentId!==row.dataset.parent)return;
      clearMarks();
      moveSubAction(p,d.id,row.dataset.id,dropHalf(row,e)?"after":"before");
    });
  });
  const foot=main.querySelector(".lfoot");
  if(foot){
    foot.addEventListener("dragover",e=>{
      const d=readDrag(e);
      if(!d||d.kind!=="action")return;
      e.preventDefault();
      e.dataTransfer.dropEffect="move";
      foot.classList.add("drop-target");
    });
    foot.addEventListener("dragleave",()=>foot.classList.remove("drop-target"));
    foot.addEventListener("drop",e=>{
      e.preventDefault();
      const d=readDrag(e);
      foot.classList.remove("drop-target");
      const actions=p.tasks.filter(t=>!t.parentId);
      const last=actions[actions.length-1];
      if(d&&d.kind==="action"&&last&&d.id!==last.id)moveActionGroup(p,d.id,last.id,"after");
      else clearMarks();
    });
  }
}

/* ============ Glisser-déposer ============ */
function enableDrag(p,minDay){
  const body=$("#cbody");if(!body)return;
  body.querySelectorAll("[data-id]").forEach(el=>{
    const kind=el.dataset.kind;if(!kind)return; // résumés non draggables
    const t=p.tasks.find(x=>x.id===el.dataset.id);
    el.addEventListener("pointerdown",e=>{
      if(e.button!==0)return;
      e.preventDefault();
      const mode=e.target.classList.contains("l")?"l":e.target.classList.contains("r")?"r":"move";
      const startX=e.clientX;const origS=toDay(t.start);const origE=t.isMilestone?origS:toDay(t.end);
      let moved=false;
      el.setPointerCapture(e.pointerId);
      el.classList.add("dragging");
      const move=ev=>{
        const delta=Math.round((ev.clientX-startX)/dayWidth);
        if(delta!==0)moved=true;
        let ns=origS,ne=origE;
        if(kind==="ms"){ns=ne=origS+delta;}
        else if(mode==="move"){ns=origS+delta;ne=origE+delta;}
        else if(mode==="l"){ns=Math.min(origS+delta,origE);}
        else{ne=Math.max(origE+delta,origS);}
        if(kind==="ms"){el.style.left=((ns-minDay)*dayWidth+dayWidth/2-9)+"px";}
        else{el.style.left=((ns-minDay)*dayWidth)+"px";el.style.width=Math.max(dayWidth*0.9,(ne-ns+1)*dayWidth)+"px";}
        el._pending={ns,ne};
      };
      const up=ev=>{
        el.releasePointerCapture(e.pointerId);
        el.classList.remove("dragging");
        body.removeEventListener("pointermove",move);
        body.removeEventListener("pointerup",up);
        if(moved&&el._pending){
          t.start=fromDay(el._pending.ns);
          if(!t.isMilestone)t.end=fromDay(el._pending.ne);
          markDirty(true);render();
        }else{
          openEditor(p,t); // simple clic => édition
        }
      };
      body.addEventListener("pointermove",move);
      body.addEventListener("pointerup",up);
    });
  });
}

/* ============ Actions sur données ============ */
function addProject(){
  const p={id:uid(),name:"Nouveau projet",tasks:[]};
  state.projects.push(p);state.activeId=p.id;markDirty(true);
  const a={id:uid(),parentId:null,name:"Première action",start:fromDay(todayDay()),end:fromDay(todayDay()+6),progress:0,isMilestone:false,deps:[],status:"todo"};
  p.tasks.push(a);render();
}
function deleteProject(p){
  if(!confirm(`Supprimer le projet « ${p.name} » et toutes ses lignes ?`))return;
  state.projects=state.projects.filter(x=>x.id!==p.id);
  state.activeId=state.projects[0]?state.projects[0].id:null;
  markDirty(true);render();
}
function addTask(p,parentId){
  const base=todayDay();
  const t={id:uid(),parentId:parentId||null,name:parentId?"Nouvelle sous-action":"Nouvelle action",
    start:fromDay(base),end:fromDay(base+(parentId?3:5)),progress:0,isMilestone:false,deps:[],assignees:[],status:"todo"};
  // insère la sous-action juste après les enfants existants
  if(parentId){
    collapsed.delete(parentId);
    const idx=p.tasks.map(x=>x.id).lastIndexOf(parentId);
    let ins=idx+1;while(ins<p.tasks.length&&p.tasks[ins].parentId===parentId)ins++;
    p.tasks.splice(ins,0,t);
  }else p.tasks.push(t);
  markDirty(true);render();openEditor(p,t);
}
function deleteTask(p,t){
  p.tasks=p.tasks.filter(x=>x.id!==t.id&&x.parentId!==t.id);
  p.tasks.forEach(x=>{if(x.deps)x.deps=x.deps.filter(d=>d!==t.id);});
  markDirty(true);closeModal();render();
}

/* ============ Modale d'édition ============ */
function descendants(p,id){const out=[id];children(p,id).forEach(c=>out.push(...descendants(p,c.id)));return out;}
function openEditor(p,t){
  const isAction=!t.parentId;const hasKids=isAction&&children(p,t.id).length>0;
  const excl=new Set(descendants(p,t.id));
  const candidates=p.tasks.filter(x=>!excl.has(x.id));
  const depBoxes=candidates.length?candidates.map(c=>
    `<label><input type="checkbox" value="${c.id}" ${(t.deps||[]).includes(c.id)?"checked":""}>

  m.innerHTML=`
    <h3>${isAction?"Action":"Sous-action"}</h3>

    <div class="field"><label>Nom</label><input type="text" id="f_name" value="${esc(t.name)}" autocomplete="off"></div>
    <div class="field"><label>État</label>
      <div class="seg status-seg">${STATUSES.map(s=>`<button type="button" class="st-pick st-${s.id}${statusOf(t)===s.id?" on":""}" data-status="${s.id}">${esc(s.label)}</button>`).join("")}</div></div>
    <div class="field"><label>Type</label>
      <div class="seg"><button id="seg_task" class="${t.isMilestone?"":"on"}" ${hasKids?"disabled style=opacity:.4":""}>Tâche</button>
      <button id="seg_ms" class="${t.isMilestone?"on":""}" ${hasKids?"disabled style=opacity:.4":""}>Jalon ◆</button></div></div>
    <div class="two">
      <div class="field"><label>${t.isMilestone?"Date":"Début"}</label><input type="date" id="f_start" value="${t.start}" ${hasKids?"disabled":""}></div>
      <div class="field" id="endWrap" style="${t.isMilestone?"display:none":""}"><label>Fin</label><input type="date" id="f_end" value="${t.end}" ${hasKids?"disabled":""}></div>
    </div>
    <div class="field" id="progWrap" style="${hasKids?"display:none":""}"><label>Avancement</label>
      <div class="range-row"><input type="range" id="f_prog" min="0" max="100" step="5" value="${t.progress||0}"><span class="val" id="progVal">${t.progress||0}%</span></div></div>
    <div class="field"><label>Dépend de (prédécesseurs)</label><div class="deps">${depBoxes}</div></div>
    <div class="field">
      <label>Responsables</label>
      <div id="peopleWrap"></div>
      <div class="chips-help">Validez avec Entrée ou virgule. Les noms déjà saisis dans ce projet sont suggérés.</div>
      <datalist id="${"dl_"+t.id}">${[...new Set(p.tasks.flatMap(x=>x.assignees||[]))].sort().map(n=>`<option value="${esc(n)}">`).join("")}</datalist>
    </div>
    <div class="modal-foot">
      <button class="del" id="m_del">Supprimer</button>
      <button class="ghost" id="m_cancel">Annuler</button>
      <button class="save" id="m_save">Enregistrer</button>
    </div>`;
  $("#scrim").classList.add("on");
  $("#f_name").focus();$("#f_name").select();
  let curStatus=statusOf(t);
  m.querySelectorAll(".st-pick").forEach(btn=>{
    btn.onclick=()=>{
      curStatus=btn.dataset.status;
      m.querySelectorAll(".st-pick").forEach(b=>b.classList.toggle("on",b.dataset.status===curStatus));
    };
  });

  let ms=t.isMilestone;
  const refreshType=()=>{
    $("#seg_task").classList.toggle("on",!ms);$("#seg_ms").classList.toggle("on",ms);
    $("#endWrap").style.display=ms?"none":"";
    $("#f_start").previousElementSibling; // label restant
    m.querySelector("#f_start").closest(".field").querySelector("label").textContent=ms?"Date":"Début";
  };
  if(!hasKids){
    $("#seg_task").onclick=()=>{ms=false;refreshType();};
    $("#seg_ms").onclick=()=>{ms=true;refreshType();};
  }
  $("#f_prog").oninput=e=>$("#progVal").textContent=e.target.value+"%";

  /* Responsables : édition par pastilles */
  let people=[...(t.assignees||[])];
  const dlId="dl_"+t.id;
  function paintPeople(){
    $("#peopleWrap").innerHTML=`<div class="chips-input" id="ci">
      ${people.map((n,i)=>`<span class="pchip"><span class="av" style="background:${nameColor(n)}">${esc(initials(n))}</span>${esc(n)}<button type="button" class="rm" data-i="${i}" title="Retirer">×</button></span>`).join("")}
      <input id="ci_in" list="${dlId}" placeholder="${people.length?"Ajouter un nom…":"Tapez un nom puis Entrée"}" autocomplete="off">
    </div>`;
    const inp=$("#ci_in");
    const add=v=>{v=v.trim();if(v&&!people.some(x=>x.toLowerCase()===v.toLowerCase())){people.push(v);paintPeople();$("#ci_in").focus();}};
    inp.addEventListener("keydown",e=>{
      if(e.key==="Enter"||e.key===","){e.preventDefault();add(inp.value);inp.value="";}
      else if(e.key==="Backspace"&&!inp.value&&people.length){people.pop();paintPeople();$("#ci_in").focus();}
    });
    inp.addEventListener("blur",()=>{if(inp.value.trim()){add(inp.value);inp.value="";}});
    inp.addEventListener("change",()=>{if(inp.value.trim()){add(inp.value);inp.value="";}});
    $("#ci").querySelectorAll(".rm").forEach(b=>b.addEventListener("click",()=>{people.splice(+b.dataset.i,1);paintPeople();}));
  }
  paintPeople();
  $("#m_cancel").onclick=closeModal;
  $("#m_del").onclick=()=>deleteTask(p,t);
  $("#m_save").onclick=()=>{
    t.name=$("#f_name").value.trim()||t.name;
    t.status=curStatus;
    if(!hasKids){
      t.isMilestone=ms;
      t.start=$("#f_start").value||t.start;
      if(ms){t.end=t.start;}
      else{let e=$("#f_end").value||t.end;if(toDay(e)<toDay(t.start))e=t.start;t.end=e;}
      t.progress=ms?0:parseInt($("#f_prog").value,10);
    }
    t.deps=[...m.querySelectorAll(".deps input:checked")].map(c=>c.value);
    t.assignees=people.slice();
    markDirty(true);closeModal();render();
  };
}
function closeModal(){$("#scrim").classList.remove("on");$("#modal").innerHTML="";}

/* ============ Impression / PDF ============ */
/* 1) Ouvre une boîte de dialogue : période + sélection des tâches */
function printGantt(){
  const p=activeProject();if(!p)return;
  const ext=dataExtent(p);
  const fromDef=fromDay(ext.min),toDef=fromDay(ext.max);
  const actions=p.tasks.filter(t=>!t.parentId);
  let rows="";
  actions.forEach(a=>{
    rows+=`<label class="pf-action"><input type="checkbox" class="pf-act" data-id="${a.id}" checked> ${esc(a.name)}</label>`;
    p.tasks.filter(t=>t.parentId===a.id).forEach(s=>{
      rows+=`<label class="pf-sub"><input type="checkbox" class="pf-task" data-id="${s.id}" data-parent="${a.id}" checked>${s.isMilestone?"◆ ":"↳ "}${esc(s.name)}</label>`;
    });
  });
  const m=$("#modal");
  m.innerHTML=`
    <h3>Imprimer / Exporter en PDF</h3>
    <div class="kind">Format paysage, ajusté à la largeur de la page.</div>
    <div class="two">
      <div class="field"><label>Du</label><input type="date" id="pf_from" value="${fromDef}"></div>
      <div class="field"><label>Au</label><input type="date" id="pf_to" value="${toDef}"></div>
    </div>
    <div class="field">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <label style="margin:0">Tâches à afficher</label>
        <button type="button" id="pf_all" class="pf-toggle">Tout décocher</button>
      </div>
      <div class="deps" id="pf_list" style="max-height:230px">${rows||'<div class="none">Aucune tâche.</div>'}</div>
    </div>
    <div class="modal-foot">
      <button class="ghost" id="pf_cancel">Annuler</button>
      <button class="save" id="pf_go">Imprimer</button>
    </div>`;
  $("#scrim").classList.add("on");

  const list=$("#pf_list");
  // cocher/décocher une action coche aussi ses sous-tâches
  list.querySelectorAll(".pf-act").forEach(cb=>cb.addEventListener("change",()=>{
    list.querySelectorAll(`.pf-task[data-parent="${cb.dataset.id}"]`).forEach(s=>s.checked=cb.checked);
  }));
  $("#pf_all").onclick=()=>{
    const boxes=[...list.querySelectorAll("input")];
    const target=boxes.some(b=>b.checked); // s'il en reste de cochés -> on décoche tout
    boxes.forEach(b=>b.checked=!target);
    $("#pf_all").textContent=target?"Tout cocher":"Tout décocher";
  };
  $("#pf_cancel").onclick=closeModal;
  $("#pf_go").onclick=()=>{
    let from=$("#pf_from").value||fromDef, to=$("#pf_to").value||toDef;
    if(toDay(to)<toDay(from)){const t=from;from=to;to=t;}
    const inc=new Set();
    list.querySelectorAll(".pf-act:checked,.pf-task:checked").forEach(b=>inc.add(b.dataset.id));
    // une sous-tâche cochée force l'affichage de son action parente
    list.querySelectorAll(".pf-task:checked").forEach(b=>inc.add(b.dataset.parent));
    runPrint(from,to,inc);
  };
}
/* 2) Applique le filtre, calcule le zoom largeur, lance l'impression */
function runPrint(from,to,included){
  printFilter.active=true;printFilter.from=from;printFilter.to=to;printFilter.included=included;
  closeModal();
  render();
  requestAnimationFrame(()=>{
    const layout=document.querySelector(".layout");
    const TARGET_W=1036; // largeur imprimable A4 paysage (~277mm @96dpi)
    const natW=layout?layout.scrollWidth:TARGET_W;
    const scale=Math.min(1,TARGET_W/natW);
    document.documentElement.style.setProperty("--print-scale",scale);
    setTimeout(()=>window.print(),60);
  });
}
window.addEventListener("afterprint",()=>{
  document.documentElement.style.setProperty("--print-scale",1);
  if(printFilter.active){printFilter.active=false;printFilter.included=null;render();}
});

/* ============ Export / Import (dossier mémorisé) ============ */
const FS_DB="gantt-atelier-fs",FS_STORE="handles",FS_DIR_KEY="dataDir";
let dataDirHandle=null;
const fsDirSupported=()=>typeof window.showDirectoryPicker==="function";

function exportFilename(){
  const d=new Date(),p=n=>String(n).padStart(2,"0");
  return `gantt-${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}_${p(d.getHours())}-${p(d.getMinutes())}-${p(d.getSeconds())}.json`;
}
function openFSDB(){
  return new Promise((ok,no)=>{
    const r=indexedDB.open(FS_DB,1);
    r.onupgradeneeded=()=>r.result.createObjectStore(FS_STORE);
    r.onsuccess=()=>ok(r.result);
    r.onerror=()=>no(r.error);
  });
}
async function saveDirHandle(h){
  const db=await openFSDB();
  return new Promise((ok,no)=>{
    const tx=db.transaction(FS_STORE,"readwrite");
    tx.objectStore(FS_STORE).put(h,FS_DIR_KEY);
    tx.oncomplete=ok;tx.onerror=()=>no(tx.error);
  });
}
async function loadDirHandle(){
  try{
    const db=await openFSDB();
    return new Promise((ok,no)=>{
      const tx=db.transaction(FS_STORE,"readonly");
      const req=tx.objectStore(FS_STORE).get(FS_DIR_KEY);
      req.onsuccess=()=>ok(req.result||null);
      req.onerror=()=>no(req.error);
    });
  }catch{return null;}
}
async function verifyDirAccess(h,mode="readwrite"){
  if(!h)return false;
  let perm=await h.queryPermission({mode});
  if(perm==="granted")return true;
  if(perm==="prompt")perm=await h.requestPermission({mode});
  return perm==="granted";
}
function updateFolderHint(){
  const el=$("#folderHint");
  if(!el)return;
  if(dataDirHandle&&fsDirSupported()){
    el.hidden=false;
    el.innerHTML=`Dossier : <span title="${esc(dataDirHandle.name)}">${esc(dataDirHandle.name)}</span>
      <button type="button" id="changeFolderBtn">Changer</button>`;
    $("#changeFolderBtn").onclick=()=>pickDataFolder(true);
  }else if(fsDirSupported()){
    el.hidden=false;
    el.textContent="Le dossier sera mémorisé au premier export ou import.";
  }else{
    el.hidden=false;
    el.textContent="Dossier non mémorisé (utilisez Chrome ou Edge).";
  }
}
async function pickDataFolder(force){
  if(!fsDirSupported())return null;
  try{
    const h=await window.showDirectoryPicker({
      mode:"readwrite",
      id:"gantt-atelier-data",
      startIn:dataDirHandle||"documents"
    });
    dataDirHandle=h;
    await saveDirHandle(h);
    updateFolderHint();
    return h;
  }catch(e){
    if(e.name!=="AbortError"&&!force)alert("Impossible d’accéder au dossier : "+e.message);
    return null;
  }
}
async function ensureDataDir(){
  if(!fsDirSupported())return null;
  if(!dataDirHandle)dataDirHandle=await loadDirHandle();
  if(dataDirHandle&&await verifyDirAccess(dataDirHandle))return dataDirHandle;
  return pickDataFolder(false);
}
function exportPayload(){
  return JSON.stringify({version:1,exportedAt:new Date().toISOString(),activeId:state.activeId,projects:state.projects},null,2);
}
function downloadJSON(json,name){
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);
}
async function exportJSON(){
  const json=exportPayload();
  const name=exportFilename();
  if(fsDirSupported()){
    try{
      const dir=await ensureDataDir();
      if(dir){
        const fh=await dir.getFileHandle(name,{create:true});
        const w=await fh.createWritable();
        await w.write(json);
        await w.close();
        markDirty(false);
        return;
      }
    }catch(e){
      if(e.name==="AbortError")return;
      console.warn(e);
    }
  }
  downloadJSON(json,name);
  markDirty(false);
}
function importJSON(file){
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const data=JSON.parse(rd.result);
      const projects=Array.isArray(data)?data:data.projects;
      if(!Array.isArray(projects))throw 0;
      projects.forEach(p=>{p.id=p.id||uid();p.tasks=(p.tasks||[]).map(t=>({
        id:t.id||uid(),parentId:t.parentId||null,name:t.name||"Sans nom",
        start:t.start,end:t.end||t.start,progress:t.progress||0,
        isMilestone:!!t.isMilestone,deps:Array.isArray(t.deps)?t.deps:[],
        assignees:Array.isArray(t.assignees)?t.assignees.filter(x=>typeof x==="string"):[],
        status:normStatus(t.status)
      }));});
      state.projects=projects;
      state.activeId=(data.activeId&&projects.some(p=>p.id===data.activeId))?data.activeId:(projects[0]?projects[0].id:null);
      collapsed.clear();markDirty(false);render();
    }catch{alert("Fichier JSON invalide ou illisible.");}
  };
  rd.readAsText(file);
}
async function findLatestBackup(dir){
  const files=[];
  for await(const entry of dir.values()){
    if(entry.kind!=="file"||!/^gantt-.+\.json$/i.test(entry.name))continue;
    const file=await entry.getFile();
    files.push({name:entry.name,file,mtime:file.lastModified});
  }
  if(!files.length)return null;
  files.sort((a,b)=>b.mtime-a.mtime);
  return files[0];
}
function offerImportLatest(latest){
  const when=new Date(latest.mtime).toLocaleString("fr-FR",{dateStyle:"medium",timeStyle:"short"});
  $("#modal").innerHTML=`
    <h3>Importer</h3>
    <div class="kind">Sauvegarde la plus récente dans votre dossier.</div>
    <p style="margin:0 0 6px;font-weight:700;font-size:15px;word-break:break-all">${esc(latest.name)}</p>
    <p style="margin:0;color:var(--muted);font-size:13px">Enregistré le ${esc(when)}</p>
    <div class="modal-foot">
      <button type="button" class="ghost" id="imp_other">Autre fichier…</button>
      <button type="button" class="ghost" id="imp_cancel">Annuler</button>
      <button type="button" class="save" id="imp_go">Importer</button>
    </div>`;
  $("#scrim").classList.add("on");
  $("#imp_go").onclick=()=>{closeModal();importJSON(latest.file);};
  $("#imp_cancel").onclick=closeModal;
  $("#imp_other").onclick=()=>{closeModal();importPickFile();};
}
async function importPickFile(){
  if(fsDirSupported()&&window.showOpenFilePicker){
    try{
      const dir=await ensureDataDir();
      const opts={
        multiple:false,
        types:[{description:"Sauvegarde Gantt",accept:{"application/json":[".json"]}}]
      };
      if(dir)opts.startIn=dir;
      const [fh]=await window.showOpenFilePicker(opts);
      importJSON(await fh.getFile());
      return;
    }catch(e){
      if(e.name==="AbortError")return;
      console.warn(e);
    }
  }
  $("#fileInput").click();
}
async function importFromDisk(){
  if(fsDirSupported()){
    try{
      const dir=await ensureDataDir();
      if(dir){
        const latest=await findLatestBackup(dir);
        if(latest){offerImportLatest(latest);return;}
      }
    }catch(e){
      if(e.name==="AbortError")return;
      console.warn(e);
    }
  }
  importPickFile();
}

function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

/* ============ Panneau Projets ============ */
const SIDEBAR_LS="gantt-sidebar-collapsed";
function syncSidebarToggle(){
  const collapsed=document.body.classList.contains("sidebar-collapsed");
  document.querySelectorAll("#sidebarToggleTop").forEach(btn=>{
    btn.title=collapsed?"Afficher le menu Projets":"Masquer le menu Projets";
    btn.setAttribute("aria-expanded",collapsed?"false":"true");
  });
}
function toggleSidebar(force){
  const next=typeof force==="boolean"?force:!document.body.classList.contains("sidebar-collapsed");
  document.body.classList.toggle("sidebar-collapsed",next);
  localStorage.setItem(SIDEBAR_LS,next?"1":"0");
  syncSidebarToggle();
}
function wireSidebarToggle(){
  document.querySelectorAll("#sidebarToggleTop").forEach(btn=>{
    btn.onclick=()=>toggleSidebar();
  });
  syncSidebarToggle();
}
function initSidebar(){
  if(localStorage.getItem(SIDEBAR_LS)==="1")document.body.classList.add("sidebar-collapsed");
  syncSidebarToggle();
}

/* ============ Init ============ */
initSidebar();
$("#addProj").onclick=addProject;
$("#exportBtn").onclick=()=>exportJSON();
$("#importBtn").onclick=()=>importFromDisk();
$("#fileInput").onchange=e=>{if(e.target.files[0])importJSON(e.target.files[0]);e.target.value="";};
loadDirHandle().then(h=>{if(h)dataDirHandle=h;updateFolderHint();});
$("#scrim").addEventListener("click",e=>{if(e.target.id==="scrim")closeModal();});
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){closeStatusPicker();closeModal();}
});
window.addEventListener("beforeunload",e=>{if(dirty){e.preventDefault();e.returnValue="";}});

seed();
markDirty(false);
render();
</script>
